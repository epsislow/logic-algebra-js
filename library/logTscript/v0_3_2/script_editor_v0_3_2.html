  color: #eaeaea;
  background: #1c1c1c;

  border: 1px solid #2a2a2a;

  cursor: pointer;
  vertical-align: middle;

  transition:
    background-color 0.15s ease,
    border-color 0.15s ease,
    transform 0.05s ease;
}

.btn:hover {
  background: #242424;
  border-color: #3a3a3a;
}

.btn:active {
  transform: translateY(1px);
  background: #2a2a2a;
}

.btn--primary {
  background: linear-gradient(180deg, #2f80ff, #1f66e0);
  border-color: #2f80ff;
  color: #fff;
}

.btn[disabled="1"] {
  color: #333;
}

.btn--primary:hover {
  background: linear-gradient(180deg, #3a8cff, #2a72eb);
}


#tabsActive .tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  height: 30px;
  min-width: 20px;
  padding: 0 10px;
  margin: 6px 2px;

  font-size: 13px;
  line-height: 1;
  font-weight: 500;

  color: #eaeaea;

.led-red-glow {
  width: 20px;
  height: 20px;
  background-color: #ff4d4d;
  border-radius: 50%;
  box-shadow: 
    inset 0 0 5px #fff,
    0 0 5px #ff0000,
    0 0 15px #ff0000,
    0 0 30px #ff0000;
}

/* LED wrapper */
.led-wrapper {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  margin: 5px 0;
}

.led-label {
  font-family: monospace;
  font-size: 0.85rem;
  width: 5ch;
  text-align: right;
  color: #bdbdbd;
}
.led-no-label {
  font-family: monospace;
  font-size: 0.85rem;
  width: 1px;
  text-align: right;
  color: transparent;
}

.led-input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.led {
 display: inline-block; 
  width: 14px;
  height: 14px;
  border-radius: var(--led-radius, 50%);
  background-color: #222;
  box-shadow: inset 1px 1px 2px #333;
}

.led-input:checked + .led {
  background-color: var(--led-color, #ff0000);
  box-shadow:
    inset 0 0 4px #fff,
    0 0 2px var(--led-color, #ff0000),
    0 0 4px var(--led-color, #ff0000),
    0 0 8px var(--led-color, #ff0000);
}

.switch-wrapper {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  user-select: none;
  margin: 5px 0;
}

.switch-wrapper:active .switch {
  transform: scale(0.96);
}

.switch-label {
  font-family: monospace;
  font-size: 0.85rem;
  width: 5ch;
  text-align: right;
  color: #bdbdbd;
}

.switch-input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.switch {
  position: relative;
  width: 36px;
  height: 18px;
  background-color: #2a2a2a;
  border-radius: 999px;
  box-shadow: inset 0 0 0 1px #3a3a3a;
  transition: background-color 0.2s ease,
       box-shadow 0.2s ease,
       transform 0.05s ease;
}

.switch::before {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: #e0e0e0;
  border-radius: 50%;
  transition: transform 0.2s ease, background-color 0.2s ease;
}

.switch-input:checked + .switch {
  background-color: #1f6f3f;
  box-shadow:
    inset 0 0 0 1px #2ecc71,
    0 0 6px rgba(46, 204, 113, 0.6);
}

.switch-input:checked + .switch::before {
  transform: translateX(18px);
  background-color: #dfffe9;
}

.switch-input:focus-visible + .switch {
  outline: 2px solid #2ecc71;
  outline-offset: 2px;
}

.sevenseg {
  --seg-scale:.75;
}

.sevenseg-wrapper {
  display: inline-flex;
  align-items: flex-start;
  gap: 0.1rem;
  min-height: calc(1em + 2px);
  padding-bottom: 5px;
}

.sevenseg-dot {
  display: flex;
  align-items: flex-end;
  padding-bottom: 6px;
}

.sevenseg-time-dot-up {
  display: flex;
  align-items: flex-end;
  padding-bottom: 6px;
}

.sevenseg-label {
  font-family: monospace;
  font-size: 0.85rem;
  width: 5ch;
  text-align: right;
  color: #bdbdbd;
}

.sevenseg-no-label {
  font-family: monospace;
  font-size: 0.85rem;
  width: 1px;
  text-align: right;
  color: transparent;
}

.sevenseg {
  display: grid;
  grid-template-columns:
    calc(26px * var(--seg-scale))
    calc(8px  * var(--seg-scale))
    calc(26px * var(--seg-scale));
  grid-template-rows:
    calc(10px * var(--seg-scale)) /* A */
    calc(26px * var(--seg-scale)) /* F / B */
    calc(10px * var(--seg-scale)) /* G */
    calc(26px * var(--seg-scale)) /* E / C */
    calc(2px  * var(--seg-scale)) /* spacer */
    calc(10px * var(--seg-scale));/* D */
  gap: 0;
  position: relative;
  overflow: visible;
}

.seg-input {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
  pointer-events: none;
}

.segment {
  background-color: #1a1a1a;
  border-radius: 999px;
  box-shadow: inset 1px 1px 0px #777;
  cursor: pointer;
  filter: blur(0.2px);
  opacity: 0.35;
}

.sevenseg-dot {
  position: absolute;
  right: 0px;
  bottom: -6px;
  z-index: 2;
}

.sevenseg-time-dot-up {
  position: absolute;
  right: -4px;
  bottom: 10px;
  z-index: 3;
}

.sevenseg-time-dot-down {
  position: absolute;
  right: -4px;
  bottom: 20px;
  z-index: 3;
}

.seg-a,
.seg-g,
.seg-d {
  width: calc(24px * var(--seg-scale));
  height: calc(8px * var(--seg-scale));
  justify-self: center;
  align-self: center;
}

.seg-b,
.seg-c,
.seg-e,
.seg-f {
  width:  calc(8px  * var(--seg-scale));
  height: calc(24px * var(--seg-scale));
  justify-self: center;
  align-self: center;
}

.seg-h {
  width:  calc(8px * var(--seg-scale));
  height: calc(8px * var(--seg-scale));
  border-radius: 50%;
  background-color: #1a1a1a;
  box-shadow: inset 1px 1px 0px #777;
  opacity: 0.35;
  filter: blur(0.2px);
  cursor: pointer;
}

.seg-i,
.seg-j {
  width:  calc(9px * var(--seg-scale));
  height: calc(14px * var(--seg-scale));
  border-radius: 99px;
  background-color: #1a1a1a;
  box-shadow: inset 1px 1px 0px #777;
  opacity: 0.35;
  filter: blur(0.2px);
  cursor: pointer;
}

.seg-a { grid-column: 1 / 4; grid-row: 1; }
.seg-f { grid-column: 1;     grid-row: 2; }
.seg-b { grid-column: 3;     grid-row: 2; }
.seg-g { grid-column: 1 / 4; grid-row: 3; }
.seg-e { grid-column: 1;     grid-row: 4; }
.seg-c { grid-column: 3;     grid-row: 4; }
.seg-d { grid-column: 1 / 4; grid-row: 6; }

.seg-input:checked + .segment {
  opacity: 1;
  background-color: var(--seg-color, #6dff9c);
  box-shadow:
    inset 0 0 calc(6px * var(--seg-scale)) rgba(255,255,255,0.6),
    0 0 calc(8px * var(--seg-scale)) var(--seg-color),
    0 0 calc(18px * var(--seg-scale)) var(--seg-color),
    0 0 calc(36px * var(--seg-scale)) rgba(109,255,156,0.6);
}

.seg-input:checked + .seg-h {
  opacity: 1;
  background-color: var(--seg-color, #6dff9c);
  box-shadow:
    inset 0 0 calc(4px * var(--seg-scale)) rgba(255,255,255,0.6),
    0 0 calc(6px * var(--seg-scale)) var(--seg-color),
    0 0 calc(14px * var(--seg-scale)) var(--seg-color),
    0 0 calc(24px * var(--seg-scale)) rgba(109,255,156,0.6);
}

.dip-wrapper {
  display: inline-flex;
  align-items: flex-start;
  gap: 0.6rem;
}

.dip-label {
  font-family: monospace;
  font-size: 0.85rem;
  width: 5ch;

}

.dip {

.dip-unit {

.dip-input {
  position: absolute;
  width: 0;
  height: 0;
  margin: 0;
  padding: 0;

  pointer-events: none;
}

.dip-switch {
  position: relative;

  height: 36px;

  border-radius: 999px;

}

.dip-switch::before {
  content: "";

  left: 2px;
  bottom: 2px;
  width: 14px;
  height: 14px;

  border-radius: 999px;
  transition: transform 0.15s ease, background-color 0.15s ease;
}

.dip-input:checked + .dip-switch {
  background: #1f6f3f;
  box-shadow:
    inset 0 0 0 1px #2ecc71,

.dip-input:checked + .dip-switch::before {

}

.dip-visual-1 .dip-switch {

.dip-visual-1 .dip-switch::before {

.dip-no-labels .dip-unit > span:first-child {

.dip-visual-1 .dip-input:checked + .dip-switch {
  background: #1f6f3f;

  box-shadow:

.dip-row {

.lcd-wrapper {

.panel-dropdown {

/* ================= 14 SEGMENT DISPLAY ================= */

.fourteenseg-wrapper {
  display: inline-flex;
  align-items: flex-start;
  gap: 0.1rem;
  margin: 5px;
}

.fourteenseg {
  --seg-scale: .75;

  position: relative;
  width: calc(60px * var(--seg-scale));

/* generic segment */
.fseg {
  position: absolute;
  background: #1a1a1a;
  opacity: 0.3;
  border-radius: 999px;
  box-shadow: inset 1px 1px 0px #777;

/* horizontal */
.fseg-a { top: 0; left: 10px; width: 40px; height: 6px; }
.fseg-d { bottom: 0; left: 10px; width: 40px; height: 6px; }

/* vertical */

.fseg-c { bottom: 5px; right: 0; width: 6px; height: 35px; }

/* diagonals */

.fseg-i { top: 10px; right: 10px; width: 6px; height: 30px; transform: rotate(-45deg); }
.fseg-j { bottom: 10px; left: 10px; width: 6px; height: 30px; transform: rotate(-45deg); }
.fseg-k { bottom: 10px; right: 10px; width: 6px; height: 30px; transform: rotate(45deg); }

/* center vertical */
.fseg-l { top: 30px; left: 27px; width: 6px; height: 20px; }
.fseg-m { bottom: 30px; left: 27px; width: 6px; height: 20px; }

/* dot */
.fseg-dp {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  bottom: -10px;
  right: -10px;
}

<script>
// ─── LogTScript CodeMirror mode ───────────────────────────────────────────────
const _logtsKeywords = [
  "show","def","repeat","MODE","WIREWRITE","NEXT",
  "LOAD","LATCH","comp","pcb","w0","w1"
];

const _logtsComponents = [
'led','key','dip','switch','rotary','adder','subtract','divider','multiplier','counter','shifter','mem','reg','lcd','7seg','+','-','/','*','='
]
const _logtsAttributes = [
  "depth","length","nl", "on", "text","label","color"
]
const _logtsProperties = [
  "out","in","on","off","at","depth","length",
  "set", "get", "write","data",
]
const _logtsGates = [
  "AND","ANDe","OR","ORe","NOT","NOTe","XOR","XORe",
  "NAND","NANDe","NOR","NORe","LSHIFT","RSHIFT"
];

let debuglog = false;

function consoleLog(...args) {
  if (debuglog) {
    console.log(...args);
  }
}

CodeMirror.defineMode("logts", function() {

  const keywords = new Set(_logtsKeywords);
  const components = new Set(_logtsComponents);
  const compAttributes = new Set(_logtsAttributes);
  const compProperties = new Set(_logtsProperties);
  const gates    = new Set(_logtsGates);

  function isWordChar(ch) {
    return /[A-Za-z0-9_]/.test(ch);
  }
  
    function logTsToken (stream, state) {
    consoleLog("CHAR:", stream.peek(), "defComp:", state.defComp);
      if (state.inBlockComment) {
        if (stream.match(/#</)) {
          state.inBlockComment = false;
        } else {
          stream.next();
        }
        return "logts-comment";
      }

      if (stream.match(/#>/)) {
        state.inBlockComment = true;
        return "logts-comment";
      }

      if (stream.match(/#.*/)) {
        return "logts-comment";
      }

      if (stream.match(/\^[0-9A-Fa-f\s]+/)) {
        return "logts-number";
      }

      if (stream.match(/\\[0-9]+/)) {
        return "logts-number";
      }

      if (stream.match(/\d+(?:wire|bit|w|b)\b/)) {
        return "logts-type";
      }

      if (stream.match("=")) {
        state.expectBinary = true;
        return "logts-operator";
      }
      
        if (state.expectBinary && stream.eatSpace()) {
          return null;
        }

      if (state.expectBinary && stream.match(/[01]+/)) {
        state.expectBinary = false;
        return "logts-number";
      }
      
      if (state.expectBinary) {
        state.expectBinary = false;
      }

      if (
        state.expectCompType && stream.match(/[7A-Za-z_][A-Za-z0-9_]*/) ||
        !state.expectBitrange && stream.match(/[A-Za-z_][A-Za-z0-9_]*/)) {
        const word = stream.current();
        consoleLog('wordddd ' , word);

        if (gates.has(word))    return "logts-gate";
        if (keywords.has(word)) {
            if (word === 'comp') {
              state.defComp = true;
            }
            return "logts-keyword";
        }
        if (state.expectCompType && components.has(word)) {
            return "logts-component-type";
        }

        return null;
      }
      
      if (!state.expectCompName && stream.match(/[.]/)) {
         state.expectBitrange = true;
         return null;
      }
      
      if (state.expectCompName && stream.match(/[.]/)) {
        return 'logts-component-name';
      }
      
      if (stream.match(/[-]/)) {
         state.expectBitrange = true;
         return null;
      }
      
      if (stream.match(/[/]/)) {
        consoleLog('bitrange/');
         state.expectBitrange = true;
         return null;
      }

      if (state.expectBitrange && stream.match(/[0-9]+/)) {
        state.expectBitrange = false;
        return "logts-bitrange";
      }
      
      if (state.expectBitrange && stream.match(/[(]+/)) {
        consoleLog('h>');
        return "logts-operator";
      }
      
      if (state.expectBitrange && stream.match(/[A-Za-z_][A-Za-z0-9_]*/)) {
        consoleLog('q');
        state.expectBitrange = false;
        return "logts-bitdynamic";
      }
      
      if (state.expectBitrange) {
        consoleLog('expectBitrange = false');
        state.expectBitrange = false;
      }
            
      if (state.defComp) {
        if (stream.eatSpace()) {
            return null;
        }

        if (stream.peek() === '[') {
            stream.next();
            state.expectCompType = true;
            consoleLog("expectCompType");
            return "logts-operator";
        }
        
        if (stream.peek() === "]") {
          stream.next();
          state.expectCompName = true;
          consoleLog("expectCompName");
          return "logts-operator";
        }

        consoleLog('defComp = false');
        state.defComp = false;
    }

      if (stream.match(/[=:,.<>()\[\]{}\/\\~@!]/)) {
        return "logts-operator";
      }
consoleLog('or else');
      stream.next();
      return null;
    }

  return {
    startState() {
      return { 
        inBlockComment: false,
        expectBinary: false,
        expectBitrange: false,
        defComp: false,
        expectCompType: false,
        expectCompName: false,
        defPcb: false,
        expectCompProp: false
      };
    },

    eatSpace: true,
    token(stream, state) {
        const t = logTsToken(stream,state);
        consoleLog(t, " -> ", stream.current());
        return t;
    }
  };
});

CodeMirror.registerHelper("hint", "logts", function(cm) {
  const cursor = cm.getCursor();
  const token  = cm.getTokenAt(cursor);
  const start  = token.start;
  const end    = cursor.ch;
  const word   = token.string.slice(0, end - start);
  const all    = _logtsKeywords.concat(_logtsGates);
  const list   = all.filter(k => k.toLowerCase().startsWith(word.toLowerCase()));
  return {
    list,
    from: CodeMirror.Pos(cursor.line, start),
    to:   CodeMirror.Pos(cursor.line, end)
  };
});
