<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LogTScript Tests v0.3.2</title>
<style>
html, body {
  height: 100%;
  margin: 0;
}
body {
  font-family: monospace;
  background: #111;
  color: #eee;
}
#app {
  max-height: 100vh;
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
}
h1 {
  font-size: 1.25rem;
  font-weight: 500;
  margin: 0 0 12px 0;
}
#toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #333;
}
#summary {
  color: #aaa;
  font-size: 13px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 30px;
  min-width: 20px;
  padding: 0 10px;
  margin: 0;
  font-size: 13px;
  line-height: 1;
  font-weight: 500;
  font-family: monospace;
  color: #eaeaea;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 999px;
  cursor: pointer;
  transition: background-color 0.15s ease, border-color 0.15s ease;
}
.btn:hover:not(:disabled) {
  background: #242424;
  border-color: #3a3a3a;
}
.btn:active:not(:disabled) {
  transform: translateY(1px);
}
.btn:disabled {
  opacity: 0.45;
  cursor: default;
}
.btn--primary {
  background: linear-gradient(180deg, #2f80ff, #1f66e0);
  border-color: #2f80ff;
  color: #fff;
}
.btn--primary:hover:not(:disabled) {
  background: linear-gradient(180deg, #3a8cff, #2a72eb);
}
.btn--run {
  min-width: 28px;
  padding: 0 8px;
}
.test-group {
  margin-bottom: 18px;
  border: 1px solid #333;
  border-radius: 6px;
  overflow: hidden;
}
.group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  background: #1a1a1a;
  border-bottom: 1px solid #333;
  cursor: pointer;
  user-select: none;
}
.group-header:hover {
  background: #222;
}
.test-group.collapsed .group-header {
  border-bottom: none;
}
.group-header-main {
  flex: 1;
  min-width: 0;
}
.group-title-line {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.group-toggle {
  flex-shrink: 0;
  width: 14px;
  color: #666;
  font-size: 11px;
}
.test-group.collapsed .group-toggle::before {
  content: '\25B6';
}
.test-group:not(.collapsed) .group-toggle::before {
  content: '\25BC';
}
.group-title {
  font-size: 14px;
  color: #ccc;
}
.group-range {
  color: #666;
  font-size: 12px;
}
.group-summary {
  margin-top: 4px;
  color: #888;
  font-size: 12px;
}
.test-group.collapsed .test-row {
  display: none;
}
.test-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid #222;
  font-size: 13px;
}
.test-row:last-child {
  border-bottom: none;
}
.test-row.not-ported .test-title {
  color: #666;
}
.not-ported-badge {
  font-size: 11px;
  color: #666;
  padding: 2px 8px;
  border: 1px solid #333;
  border-radius: 999px;
}
.dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 4px;
  background: #555;
}
.dot.pass { background: #3d4; box-shadow: 0 0 4px #3d4; }
.dot.fail { background: #d44; box-shadow: 0 0 4px #d44; }
.dot.running { background: #fa0; }
.test-id {
  flex-shrink: 0;
  width: 36px;
  color: #88f;
  text-align: right;
}
.test-row.not-ported .test-id {
  color: #555;
}
.test-title {
  flex: 1;
  color: #ddd;
  word-break: break-word;
}
.test-detail {
  display: none;
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  background: #1a0a0a;
  border: 1px solid #522;
  border-radius: 4px;
  color: #faa;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
}
.test-row.fail-open .test-detail {
  display: block;
}
.test-body {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 8px;
}
</style>
</head>
<body>
<div id="app">
  <h1>LogTScript Tests v0.3.2</h1>
  <p id="subtitle" style="color:#888;font-size:13px;margin:0 0 12px 0"></p>
  <div id="toolbar">
    <button type="button" id="btnRunAll" class="btn btn--primary">Run All</button>
    <span id="summary">Passed: 0 | Failed: 0 | Pending: 0</span>
  </div>
  <div id="testList"></div>
</div>

<script src="core/tokenizer.js"></script>
<script src="core/preprocessor.js"></script>
<script src="core/components/component-base.js"></script>
<script src="core/components/builtin-component.js"></script>
<script src="core/components/component-registry.js"></script>
<script src="core/components/led.js"></script>
<script src="core/components/ledBar.js"></script>
<script src="core/components/switch.js"></script>
<script src="core/components/key.js"></script>
<script src="core/components/dip.js"></script>
<script src="core/components/seven-seg.js"></script>
<script src="core/components/14seg.js"></script>
<script src="core/components/dots.js"></script>
<script src="core/components/lcd.js"></script>
<script src="core/components/adder.js"></script>
<script src="core/components/subtract.js"></script>
<script src="core/components/multiplier.js"></script>
<script src="core/components/divider.js"></script>
<script src="core/components/shifter.js"></script>
<script src="core/components/mem.js"></script>
<script src="core/components/reg.js"></script>
<script src="core/components/counter.js"></script>
<script src="core/components/osc.js"></script>
<script src="core/components/rotary.js"></script>
<script src="core/components/pcb-component.js"></script>
<script src="core/components/index.js"></script>
<script src="core/parser.js"></script>
<script src="core/interpreter.js"></script>
<script src="core/signal-propagation.js"></script>
<script src="test_session.js"></script>
<script src="test_manifest.js"></script>
<script src="test_suite.js"></script>
<script src="test_suite_ported.js"></script>
<script src="run_tests.js"></script>
</body>
</html>
