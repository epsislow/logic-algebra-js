<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LogTScript Tests v0.3.2</title>
<style>
html, body {
  height: 100%;
  margin: 0;
}
body {
  font-family: monospace;
  background: #111;
  color: #eee;
}
#app {
  max-height: 100vh;
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
}
.page-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  margin: -20px -20px 12px -20px;
  border-bottom: 1px solid #333;
}
.page-toolbar h1 {
  font-size: 1.1rem;
  font-weight: 500;
  margin: 0 0 0 auto;
  color: #ccc;
}
.test-search {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
}
.test-search-label {
  font-size: 12px;
  color: #888;
  white-space: nowrap;
}
.test-search-input {
  width: 11em;
  max-width: 36vw;
  padding: 5px 8px;
  font-family: monospace;
  font-size: 13px;
  background: #1a1a1a;
  border: 1px solid #444;
  border-radius: 6px;
  color: #eee;
  box-sizing: border-box;
}
.test-search-input:focus {
  outline: none;
  border-color: #2f80ff;
}
.test-search-input::-webkit-search-cancel-button {
  cursor: pointer;
}
.test-search-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 280px;
  margin: 0;
  padding: 4px 0;
  list-style: none;
  background: #1c1c1c;
  border: 1px solid #444;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
  max-height: min(280px, 50vh);
  overflow-y: auto;
  z-index: 20;
}
.test-search-menu li button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 7px 12px;
  border: none;
  background: transparent;
  color: #ddd;
  font-family: monospace;
  font-size: 13px;
  cursor: pointer;
  line-height: 1.3;
}
.test-search-menu li button:hover,
.test-search-menu li.test-search-active button {
  background: #2a2a2a;
  color: #fff;
}
.test-search-menu .test-search-section {
  display: block;
  font-size: 11px;
  color: #777;
  margin-top: 1px;
}
.test-search-menu .test-search-empty {
  padding: 8px 12px;
  color: #888;
  font-size: 12px;
}
.test-row.search-highlight,
.test-group.search-highlight > .group-header {
  animation: test-search-flash 1.2s ease;
}
@keyframes test-search-flash {
  0%, 100% { background-color: transparent; }
  15%, 45% { background-color: rgba(47, 128, 255, 0.18); }
}
#toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #333;
}
#summary {
  color: #aaa;
  font-size: 13px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 30px;
  min-width: 20px;
  padding: 0 10px;
  margin: 0;
  font-size: 13px;
  line-height: 1;
  font-weight: 500;
  font-family: monospace;
  color: #eaeaea;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 999px;
  cursor: pointer;
  transition: background-color 0.15s ease, border-color 0.15s ease;
}
.btn:hover:not(:disabled) {
  background: #242424;
  border-color: #3a3a3a;
}
.btn:active:not(:disabled) {
  transform: translateY(1px);
}
.btn:disabled {
  opacity: 0.45;
  cursor: default;
}
.btn--primary {
  background: linear-gradient(180deg, #2f80ff, #1f66e0);
  border-color: #2f80ff;
  color: #fff;
}
.btn--primary:hover:not(:disabled) {
  background: linear-gradient(180deg, #3a8cff, #2a72eb);
}
.btn--run {
  min-width: 28px;
  padding: 0 8px;
}
.test-group {
  margin-bottom: 18px;
  border: 1px solid #333;
  border-radius: 6px;
  overflow: hidden;
}
.group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  background: #1a1a1a;
  border-bottom: 1px solid #333;
  cursor: pointer;
  user-select: none;
}
.group-header:hover {
  background: #222;
}
.group-header.tests-running {
  background-color: #333300;
}
.group-header.tests-running:hover {
  background-color: #3d3d00;
}
.group-header.tests-error {
  background-color: #330000;
}
.group-header.tests-error:hover {
  background-color: #3d0000;
}
.group-header.tests-success {
  background-color: #003300;
}
.group-header.tests-success:hover {
  background-color: #003d00;
}
.test-group.collapsed .group-header {
  border-bottom: none;
}
.group-header-main {
  flex: 1;
  min-width: 0;
}
.group-title-line {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 4px;
}
.group-toggle {
  flex-shrink: 0;
  width: 14px;
  color: #666;
  font-size: 11px;
}
.test-group.collapsed .group-toggle::before {
  content: '\25B6';
}
.test-group:not(.collapsed) .group-toggle::before {
  content: '\25BC';
}
.group-title {
  font-size: 12px;
  color: #ccc;
}
.group-range {
  color: #666;
  font-size: 12px;
}
.group-summary {
  margin-top: 4px;
  color: #888;
  font-size: 10px;
}
.test-group.collapsed .test-row {
  display: none;
}
.test-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid #222;
  font-size: 13px;
}
.test-row:last-child {
  border-bottom: none;
}
.not-ported-badge {
  font-size: 11px;
  color: #666;
  padding: 2px 8px;
  border: 1px solid #333;
  border-radius: 999px;
}
.prop-badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: lowercase;
  padding: 2px 7px;
  border-radius: 999px;
  border: 1px solid transparent;
}
.prop-badge--legacy {
  color: #5c8;
  background: #1a2e1a;
  border-color: #3a5a3a;
}
.prop-badge--wave {
  color: #fa0;
  background: #2e2210;
  border-color: #5a4018;
}
.prop-badge--mixed {
  color: #5ce;
  background: #10282e;
  border-color: #2a5a66;
}
.prop-legend {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: #888;
  margin-left: 4px;
}
.prop-legend-item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.prop-legend-swatch {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  border: 1px solid transparent;
}
.prop-legend-swatch--legacy {
  background: #1a2e1a;
  border-color: #5c8;
}
.prop-legend-swatch--wave {
  background: #2e2210;
  border-color: #fa0;
}
.prop-legend-swatch--mixed {
  background: #10282e;
  border-color: #5ce;
}
.dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 4px;
  background: #555;
}
.dot.pass { background: #3d4; box-shadow: 0 0 4px #3d4; }
.dot.fail { background: #d44; box-shadow: 0 0 4px #d44; }
.dot.running { background: #fa0; }
.test-id {
  flex-shrink: 0;
  width: 36px;
  color: #88f;
  text-align: right;
}
.test-row.not-ported .test-id {
  color: #555;
}
.test-title {
  flex: 1;
  color: #ddd;
  word-break: break-word;
  cursor: pointer;
  user-select: none;
}
.test-title:hover {
  color: #fff;
}
.test-title.is-open {
  color: #cfe8ff;
}
.test-row.not-ported .test-title {
  color: #666;
  cursor: default;
}
.test-row.not-ported .test-title:hover {
  color: #666;
}
.test-head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  width: 100%;
}
.test-info {
  display: none;
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  background: #141820;
  border: 1px solid #2a3545;
  border-radius: 4px;
  box-sizing: border-box;
}
.test-row.info-open .test-info {
  display: block;
}
.test-info-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.test-info-tab {
  min-height: 24px;
  padding: 0 10px;
  font-size: 11px;
  border-radius: 999px;
}
.test-info-tab.is-active {
  background: #243040;
  border-color: #4a7090;
  color: #cfe8ff;
}
.test-info-panel {
  display: none;
}
.test-info-panel.is-active {
  display: block;
}
.test-info-pre {
  margin: 0;
  padding: 8px;
  background: #0d1117;
  border: 1px solid #222;
  border-radius: 4px;
  color: #b8d4a8;
  font-size: 11px;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: min(70vh, 560px);
  overflow: auto;
}
.test-info-pre--script {
  font-family: Consolas, "Courier New", monospace;
}
.test-info-pre--source {
  color: #c9d1d9;
}
.test-info-list {
  margin: 0;
  padding: 0 0 0 18px;
  color: #ccc;
  font-size: 12px;
  line-height: 1.5;
}
.test-info-list--steps code {
  color: #9cf;
  font-size: 11px;
}
.test-info-empty {
  margin: 0;
  color: #777;
  font-size: 12px;
  font-style: italic;
}
.test-fail-detail {
  display: none;
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  background: #1a0a0a;
  border: 1px solid #522;
  border-radius: 4px;
  color: #faa;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
}
.test-row.fail-open .test-fail-detail {
  display: block;
}
.test-detail {
  display: none;
}
.test-row.fail-open .test-detail {
  display: none;
}
.test-body {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 8px;
}
</style>
</head>
<body>
<div id="app">
  <div class="page-toolbar">
    <button type="button" id="btnEditor" class="btn">&larr; Editor</button>
    <div class="test-search" id="testSearch">

      <input type="search" id="testSearchInput" class="test-search-input" placeholder="group or #…" autocomplete="off" spellcheck="false" aria-autocomplete="list" aria-controls="testSearchMenu" aria-expanded="false" />
      <ul class="test-search-menu" id="testSearchMenu" hidden role="listbox"></ul>

    <h1>LogTScript Tests v0.3.2</h1>

  <div id="toolbar">
    <button type="button" id="btnRunAll" class="btn btn--primary">Run All</button>
    <span id="summary">Passed: 0 | Failed: 0 | Pending: 0</span>
    <span class="prop-legend" aria-label="Propagation mode legend">
      <span class="prop-legend-item"><span class="prop-legend-swatch prop-legend-swatch--legacy"></span>legacy</span>

      <span class="prop-legend-item"><span class="prop-legend-swatch prop-legend-swatch--mixed"></span>mixed</span>
    </span>
  </div>
  <div id="testList"></div>
</div>
