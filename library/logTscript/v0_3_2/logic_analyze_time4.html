<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Logic Analyzer - Mobile Version</title>
  <style>
    body {
      background-color: #121214;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }
    h1 { margin: 5px 0; font-size: 1.3rem; }
    p { color: #94a3b8; margin: 0 0 15px 0; font-size: 0.8rem; text-align: center; max-width: 90vw; }
    
    /* Changed to vertical column layout to ensure canvas and buttons fit on small mobile screens */
    .main-layout {
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: #1a1a1e;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 95vw;
      max-width: 460px;
      box-sizing: border-box;
    }
    .canvas-container {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    canvas {
      background-color: #0d0d0f;
      border: 1px solid #2d2d34;
      border-radius: 6px;
      width: 100%; /* Scale smoothly on mobile screens */
      max-width: 420px;
      height: auto;
      touch-action: none; /* Prevents Android browser from hijacking drag gestures */
    }
    .controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .global-toolbar {
      background: #24242b;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toolbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }
    .grid-inputs {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* Split channel layout into two tight mobile columns */
      gap: 8px;
    }
    @media (max-width: 360px) {
      .grid-inputs { grid-template-columns: 1fr; } /* Stack safely if screen is ultra-narrow */
    }
    .channel-row {
      background: #24242b;
      padding: 8px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .channel-label {
      font-weight: bold;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
    }
    .status-indicator { font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; background: #333; }
    .btn-group { display: flex; gap: 4px; }
    button {
      flex: 1;
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 8px 6px; /* Optimized padding size for finger taps */
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
    }
    button:active { filter: brightness(0.8); }
    button.pulse-btn { background-color: #8b5cf6; }
    button.action-btn { background-color: #475569; }
    button.active-toggle { background-color: #ef4444; }
    .speed-badge { background: #1e1b4b; color: #818cf8; padding: 2px 6px; border-radius: 4px; font-weight: bold; min-width: 45px; text-align: center; }
  </style>
</head>
<body>

  <h1>Interactive Logic Analyzer</h1>
  <p><b>Drag up/down</b> directly on the grid canvas to scroll history. Feed auto-pauses when dragging.</p>

  <div class="main-layout">
    <div class="canvas-container">
      <canvas id="timelineCanvas" width="420" height="480"></canvas>
    </div>
    
    <div class="controls">
      <div class="global-toolbar">
        <div class="toolbar-row">
          <span>Engine:</span>
          <button id="pauseBtn" class="action-btn" onclick="togglePause()">Pause</button>
          <button class="action-btn" style="background:#0284c7; margin-left:5px;" onclick="resetScroll()">Live View</button>
        </div>
        <div class="toolbar-row">
          <span>Speed Feed:</span>
          <div class="btn-group" style="flex: 2; margin-left: 15px;">
            <button onclick="changeSpeedStep(-1)">-</button>
            <span class="speed-badge" id="speedDisplay">1.0x</span>
            <button onclick="changeSpeedStep(1)">+</button>
          </div>
        </div>
      </div>

      <div class="grid-inputs" id="hardwarePinsContainer"></div>
    </div>
  </div>

<script>
const canvas = document.getElementById('timelineCanvas');
const ctx = canvas.getContext('2d');

const STATE_LOW  = 0; const STATE_RISE = 1;
const STATE_HIGH = 2; const STATE_FALL = 3;

const COLORS = {
  [STATE_LOW]:  '#2a1616', [STATE_HIGH]: '#2ecc71',
  [STATE_RISE]: '#ffffff', [STATE_FALL]: '#a855f7'
};

const MAX_CHANNELS = 5;
let baseRowHeight = 6; 
let edgeRowHeight = 16; 

// Sub-1x fractional speed step array
const SPEED_STEPS = [0.1, 0.25, 0.4, 0.5, 0.75, 1.0, 2.0, 3.0, 4.0];
let currentSpeedIndex = 5; // Maps to index 5 which is 1.0x
let speedAccumulator = 0;

let isPaused = false;
let systemRunningTimeMs = 0; 
let lastSecondMarkerDropped = 0;
let scrollOffsetY = 0; 

let virtualHardwarePins = Array(MAX_CHANNELS).fill(false);
let channels = Array.from({ length: MAX_CHANNELS }, () => []);
let generalTimeMarkers = []; 

// Touch state variables
let isDragging = false;
let dragStartY = 0;

function createControlPanel() {
  const container = document.getElementById('hardwarePinsContainer');
  for (let i = 0; i < MAX_CHANNELS; i++) {
    const row = document.createElement('div');
    row.className = 'channel-row';
    row.innerHTML = `
      <div class="channel-label">
        <span>CH ${i}</span>
        <span class="status-indicator" id="status-${i}" style="color: #ef4444;">LOW</span>
      </div>
      <div class="btn-group">
        <button onclick="togglePin(${i})">Toggle</button>
        <button class="pulse-btn" onclick="triggerPulse(${i})">Pulse</button>
      </div>
    `;
    container.appendChild(row);
  }
}

function togglePin(chIndex) {
  virtualHardwarePins[chIndex] = !virtualHardwarePins[chIndex];
  updateHardwareUI(chIndex);
}

function triggerPulse(chIndex) {
  virtualHardwarePins[chIndex] = true;
  updateHardwareUI(chIndex);
  setTimeout(() => {
    virtualHardwarePins[chIndex] = false;
    updateHardwareUI(chIndex);
  }, 100);
}

function updateHardwareUI(chIndex) {
  const label = document.getElementById(`status-${chIndex}`);
  if (virtualHardwarePins[chIndex]) {
    label.innerText = "HIGH"; label.style.color = "#2ecc71";
  } else {
    label.innerText = "LOW"; label.style.color = "#ef4444";
  }
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pauseBtn');
  if (isPaused) {
    btn.innerText = "Resume";
    btn.classList.add('active-toggle');
  } else {
    btn.innerText = "Pause";
    btn.classList.remove('active-toggle');
    resetScroll();
  }
}

function changeSpeedStep(dir) {
  currentSpeedIndex += dir;
  if (currentSpeedIndex < 0) currentSpeedIndex = 0;
  if (currentSpeedIndex >= SPEED_STEPS.length) currentSpeedIndex = SPEED_STEPS.length - 1;
  
  document.getElementById('speedDisplay').innerText = SPEED_STEPS[currentSpeedIndex] + "x";
}

function resetScroll() {
  scrollOffsetY = 0;
  renderTimeline();
}

function runSampleIngestStep() {
  systemRunningTimeMs += 20;

  let insertTimeMarkerLine = false;
  if (systemRunningTimeMs - lastSecondMarkerDropped >= 1000) {
    insertTimeMarkerLine = true;
    lastSecondMarkerDropped = Math.floor(systemRunningTimeMs / 1000) * 1000;
  }
  generalTimeMarkers.unshift({ isMarker: insertTimeMarkerLine, ms: systemRunningTimeMs });

  for (let i = 0; i < MAX_CHANNELS; i++) {
    const history = channels[i];
    const pinTarget = virtualHardwarePins[i];
    const lastNode = history[0];

    let calculatedState = pinTarget ? STATE_HIGH : STATE_LOW;

    if (lastNode !== undefined) {
      const wasHigh = (lastNode.state === STATE_HIGH || lastNode.state === STATE_RISE);
      if (!wasHigh && pinTarget)  calculatedState = STATE_RISE;
      if (wasHigh && !pinTarget) calculatedState = STATE_FALL;
    }

    history.unshift({ state: calculatedState, ms: systemRunningTimeMs });
    if (history.length > 1500) history.pop();
  }
  if (generalTimeMarkers.length > 1500) generalTimeMarkers.pop();
}

function ingestLiveSamples() {
  if (isPaused) return;

  const activeSpeed = SPEED_STEPS[currentSpeedIndex];

  if (activeSpeed >= 1.0) {
    // Standard fast loop logic
    for (let step = 0; step < Math.floor(activeSpeed); step++) {
      runSampleIngestStep();
    }
  } else {
    // Fractional precision loop mechanics
    speedAccumulator += activeSpeed;
    if (speedAccumulator >= 1.0) {
      runSampleIngestStep();
      speedAccumulator -= 1.0;
    }
  }
}

function renderTimeline() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const lanesWidth = canvas.width - 60;
  const columnWidth = lanesWidth / MAX_CHANNELS;
  let currentY = canvas.height + scrollOffsetY;

  for (let idx = 0; idx < generalTimeMarkers.length; idx++) {
    if (currentY < -40) break;

    let crossEdgeDetected = false;
    for (let col = 0; col < MAX_CHANNELS; col++) {
      if (channels[col][idx] && (channels[col][idx].state === STATE_RISE || channels[col][idx].state === STATE_FALL)) {
        crossEdgeDetected = true;
        break;
      }
    }

    const currentStepHeight = crossEdgeDetected ? edgeRowHeight : baseRowHeight;
    const targetY = currentY - currentStepHeight;

    if (currentY > 0 && targetY < canvas.height) {
      if (generalTimeMarkers[idx].isMarker && !crossEdgeDetected) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, targetY); ctx.lineTo(lanesWidth, targetY); ctx.stroke();

        ctx.fillStyle = '#64748b';
        ctx.font = '10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(`${(generalTimeMarkers[idx].ms / 1000).toFixed(0)}s`, lanesWidth + 8, targetY + 4);
      }

      if (crossEdgeDetected) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(0, targetY, lanesWidth, currentStepHeight);
      }

      for (let col = 0; col < MAX_CHANNELS; col++) {
        const node = channels[col][idx];
        if (!node) continue;

        const xStart = col * columnWidth;
        ctx.fillStyle = COLORS[node.state];

        const lowWidth = columnWidth * 0.12;
        const highWidth = columnWidth * 0.65;
        const lowOffset = (columnWidth - lowWidth) / 2;
        const highOffset = (columnWidth - highWidth) / 2;

        ctx.beginPath();

        if (node.state === STATE_RISE) {
          ctx.moveTo(xStart + lowOffset, targetY);
          ctx.lineTo(xStart + lowOffset + lowWidth, targetY);
          ctx.lineTo(xStart + highOffset + highWidth, currentY);
          ctx.lineTo(xStart + highOffset, currentY);
          ctx.closePath(); ctx.fill();
        } 
        else if (node.state === STATE_FALL) {
          ctx.moveTo(xStart + highOffset, targetY);
          ctx.lineTo(xStart + highOffset + highWidth, targetY);
          ctx.lineTo(xStart + lowOffset + lowWidth, currentY);
          ctx.lineTo(xStart + lowOffset, currentY);
          ctx.closePath(); ctx.fill();
        } 
        else if (node.state === STATE_HIGH) {
          ctx.fillRect(xStart + highOffset, targetY, highWidth, currentStepHeight);
          if (idx > 0 && channels[col][idx - 1] && channels[col][idx - 1].state === STATE_RISE) {
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 9px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${node.ms}ms`, xStart + (columnWidth / 2), currentY - 2);
          }
        } 
        else {
          ctx.fillRect(xStart + lowOffset, targetY, lowWidth, currentStepHeight);
          if (idx > 0 && channels[col][idx - 1] && channels[col][idx - 1].state === STATE_FALL) {
            ctx.fillStyle = '#a855f7';
            ctx.font = 'bold 9px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${node.ms}ms`, xStart + (columnWidth / 2), currentY - 2);
          }
        }
      }
    }
    currentY = targetY;
  }

  ctx.strokeStyle = '#222227';
  ctx.lineWidth = 1;
  for (let col = 1; col <= MAX_CHANNELS; col++) {
    ctx.beginPath(); ctx.moveTo(col * columnWidth, 0); ctx.lineTo(col * columnWidth, canvas.height); ctx.stroke();
  }
  
  ctx.fillStyle = '#141416';
  ctx.fillRect(lanesWidth, 0, 60, canvas.height);
  ctx.strokeStyle = '#2d2d34';
  ctx.beginPath(); ctx.moveTo(lanesWidth, 0); ctx.lineTo(lanesWidth, canvas.height); ctx.stroke();
}

// --- Android Touch Gesture Event Listeners ---

canvas.addEventListener('touchstart', (e) => {
  isDragging = true;
  // Read first touch contact point
  dragStartY = e.touches[0].clientY;
  if (!isPaused) togglePause();
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const currentTouchY = e.touches[0].clientY;
  const deltaY = currentTouchY - dragStartY;
  dragStartY = currentTouchY;
  
  scrollOffsetY += deltaY;
  if (scrollOffsetY < 0) scrollOffsetY = 0; 
  renderTimeline();
}, { passive: true });

canvas.addEventListener('touchend', () => { isDragging = false; });
canvas.addEventListener('touchcancel', () => { isDragging = false; });

function loop() {
  ingestLiveSamples();
  renderTimeline();
  requestAnimationFrame(loop);
}

createControlPanel();
loop();
</script>
</body>
</html>
